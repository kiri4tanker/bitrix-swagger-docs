name: Security

on:
  push:
  pull_request:
  schedule:
    - cron: '17 3 * * 1'

jobs:
  composer-audit:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Setup PHP
        uses: shivammathur/setup-php@v2
        with:
          php-version: "8.2"
          tools: composer:v2
          coverage: none

      - name: Install dependencies
        run: composer install --no-interaction --prefer-dist

      - name: Composer audit
        run: composer audit
